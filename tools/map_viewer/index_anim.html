<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Orphen Model/Animation Viewer</title>
<style>
  html, body { margin: 0; height: 100%; background: #111; color: #eee; font-family: system-ui, sans-serif; overflow: hidden; }
  #ui {
    position: absolute; top: 8px; left: 8px; z-index: 10;
    background: rgba(0,0,0,0.6); padding: 8px 10px; border-radius: 6px;
    display: flex; gap: 8px; align-items: center; font-size: 13px; flex-wrap: wrap; max-width: calc(100% - 16px);
  }
  #ui select { background: #222; color: #eee; border: 1px solid #444; padding: 4px; min-width: 120px; }
  #ui button { background: #333; color: #eee; border: 1px solid #555; padding: 4px 8px; cursor: pointer; }
  #ui button:hover { background: #444; }
  #ui label { opacity: 0.7; }
  #status { opacity: 0.8; }
  #help {
    position: absolute; bottom: 8px; left: 8px; z-index: 10;
    background: rgba(0,0,0,0.55); padding: 6px 10px; border-radius: 6px;
    font-size: 12px; line-height: 1.5; max-width: 360px;
  }
  #hint {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    color: #bbb; pointer-events: none; font-size: 18px; text-shadow: 0 1px 2px #000;
  }
  #hint.hidden { display: none; }
  canvas { display: block; }
  a.toplink { color: #6cf; text-decoration: none; }
  a.toplink:hover { text-decoration: underline; }
</style>
</head>
<body>
<div id="ui">
  <a class="toplink" href="/">Maps</a> ·
  <label>Scene:</label><select id="scene"></select>
  <label>Model:</label><select id="model"></select>
  <label>Anim:</label><select id="anim"></select>
  <button id="play">⏸ Pause</button>
  <button id="reset">Reset cam</button>
  <button id="mode">Mode: Orbit</button>
  <span id="status"></span>
</div>
<div id="help">
  <b>Orbit:</b> drag to rotate · right-drag pan · wheel zoom<br/>
  <b>FPS:</b> click to capture · WASD · Q/E · Shift crawl · Esc release<br/>
  <b>Space</b> play/pause · <b>M</b> toggle mode · <b>R</b> reset cam
</div>
<div id="hint">Loading…</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const sceneSel = document.getElementById('scene');
const modelSel = document.getElementById('model');
const animSel = document.getElementById('anim');
const playBtn = document.getElementById('play');
const modeBtn = document.getElementById('mode');
const statusEl = document.getElementById('status');
const hintEl = document.getElementById('hint');

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a22);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.01, 50000);
camera.position.set(0, 2, 5);

scene.add(new THREE.AmbientLight(0xffffff, 0.7));
const sun = new THREE.DirectionalLight(0xffffff, 0.8);
sun.position.set(1, 2, 1);
scene.add(sun);
scene.add(new THREE.HemisphereLight(0x88aaff, 0x222211, 0.4));

const grid = new THREE.GridHelper(100, 50, 0x444444, 0x222222);
grid.position.y = -0.01;
scene.add(grid);

const fpsControls = new PointerLockControls(camera, renderer.domElement);
scene.add(fpsControls.getObject());
fpsControls.addEventListener('lock', () => hintEl.classList.add('hidden'));
fpsControls.addEventListener('unlock', () => { if (mode === 'fps') hintEl.classList.remove('hidden'); });

const orbitControls = new OrbitControls(camera, renderer.domElement);
orbitControls.enableDamping = true;
orbitControls.dampingFactor = 0.1;

let mode = 'orbit';
function setMode(next) {
  mode = next;
  if (mode === 'fps') {
    orbitControls.enabled = false;
    modeBtn.textContent = 'Mode: FPS';
    hintEl.textContent = 'Click to fly · WASD + mouse';
    hintEl.classList.remove('hidden');
  } else {
    if (fpsControls.isLocked) fpsControls.unlock();
    orbitControls.enabled = true;
    modeBtn.textContent = 'Mode: Orbit';
    hintEl.classList.add('hidden');
  }
}
modeBtn.onclick = () => setMode(mode === 'fps' ? 'orbit' : 'fps');
setMode('orbit');

renderer.domElement.addEventListener('click', () => { if (mode === 'fps') fpsControls.lock(); });

const keys = new Set();
window.addEventListener('keydown', (e) => {
  keys.add(e.code);
  if (e.code === 'KeyR') resetCamera();
  if (e.code === 'KeyM') setMode(mode === 'fps' ? 'orbit' : 'fps');
  if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
});
window.addEventListener('keyup', (e) => keys.delete(e.code));
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

const loader = new GLTFLoader();
let currentRoot = null;
let mixer = null;
let action = null;
let playing = true;
let modelBounds = new THREE.Box3();
const clock = new THREE.Clock();

function clearCurrent() {
  if (mixer) { mixer.stopAllAction(); mixer.uncacheRoot(currentRoot); mixer = null; }
  action = null;
  if (!currentRoot) return;
  scene.remove(currentRoot);
  currentRoot.traverse((o) => {
    if (o.isMesh) {
      o.geometry?.dispose();
      const mats = Array.isArray(o.material) ? o.material : [o.material];
      mats.forEach((m) => {
        if (!m) return;
        for (const k of ['map','normalMap','roughnessMap','metalnessMap','emissiveMap']) { if (m[k]) m[k].dispose?.(); }
        m.dispose?.();
      });
    }
  });
  currentRoot = null;
}

function resetCamera() {
  if (modelBounds.isEmpty()) {
    camera.position.set(0, 2, 5); orbitControls.target.set(0, 0, 0); return;
  }
  const size = new THREE.Vector3(); modelBounds.getSize(size);
  const center = new THREE.Vector3(); modelBounds.getCenter(center);
  const radius = Math.max(size.x, size.y, size.z) * 0.6 + 1;
  camera.position.set(center.x, center.y + radius * 0.4, center.z + radius * 1.6);
  fpsControls.getObject().position.copy(camera.position);
  camera.lookAt(center);
  orbitControls.target.copy(center);
  orbitControls.update();
}

function togglePlay() {
  playing = !playing;
  playBtn.textContent = playing ? '⏸ Pause' : '▶ Play';
  if (action) action.paused = !playing;
}
playBtn.onclick = togglePlay;
document.getElementById('reset').onclick = resetCamera;

let tree = {}; // scene -> model -> [aid entries]
async function init() {
  tree = await fetch('/anim-index.json').then((r) => r.json());
  for (const sc of Object.keys(tree)) {
    const opt = document.createElement('option'); opt.value = sc; opt.textContent = sc; sceneSel.appendChild(opt);
  }
  sceneSel.onchange = () => populateModels();
  modelSel.onchange = () => populateAnims();
  animSel.onchange = () => loadCurrent();
  if (sceneSel.options.length) { sceneSel.selectedIndex = 0; populateModels(); }
  else { statusEl.textContent = 'no animations found'; hintEl.textContent = 'No data'; }
}

function populateModels() {
  modelSel.innerHTML = '';
  const models = tree[sceneSel.value] || {};
  for (const m of Object.keys(models)) {
    const opt = document.createElement('option'); opt.value = m; opt.textContent = m; modelSel.appendChild(opt);
  }
  if (modelSel.options.length) { modelSel.selectedIndex = 0; populateAnims(); }
}
function populateAnims() {
  animSel.innerHTML = '';
  const anims = (tree[sceneSel.value] || {})[modelSel.value] || [];
  for (const a of anims) {
    const opt = document.createElement('option'); opt.value = a.url; opt.textContent = a.aid; animSel.appendChild(opt);
  }
  if (animSel.options.length) { animSel.selectedIndex = 0; loadCurrent(); }
}

async function loadCurrent() {
  const url = animSel.value;
  const label = `${sceneSel.value} / ${modelSel.value} / ${animSel.options[animSel.selectedIndex].textContent}`;
  statusEl.textContent = `loading ${label}…`;
  clearCurrent();
  try {
    const gltf = await loader.loadAsync(url);
    currentRoot = gltf.scene;
    currentRoot.traverse((o) => {
      if (o.isMesh) {
        const mats = Array.isArray(o.material) ? o.material : [o.material];
        mats.forEach((m) => { if (m) m.side = THREE.DoubleSide; });
      }
    });
    scene.add(currentRoot);
    modelBounds.setFromObject(currentRoot);
    resetCamera();

    if (gltf.animations && gltf.animations.length) {
      mixer = new THREE.AnimationMixer(currentRoot);
      action = mixer.clipAction(gltf.animations[0]);
      action.play();
      action.paused = !playing;
      statusEl.textContent = `${label} · ${gltf.animations.length} clip(s)`;
    } else {
      statusEl.textContent = `${label} · no clips`;
    }
  } catch (err) {
    console.error(err);
    statusEl.textContent = `error: ${err.message}`;
  }
}

const velocity = new THREE.Vector3();
const direction = new THREE.Vector3();
function tick() {
  requestAnimationFrame(tick);
  const dt = Math.min(0.1, clock.getDelta());

  if (mixer) mixer.update(dt);

  if (mode === 'orbit') {
    orbitControls.update();
  } else if (fpsControls.isLocked) {
    const speedBase = keys.has('ShiftLeft') || keys.has('ShiftRight') ? 1.0 : 2.0;
    const accel = speedBase * 8;
    const damp = 10;
    velocity.x -= velocity.x * damp * dt;
    velocity.y -= velocity.y * damp * dt;
    velocity.z -= velocity.z * damp * dt;
    direction.z = (keys.has('KeyW') ? 1 : 0) - (keys.has('KeyS') ? 1 : 0);
    direction.x = (keys.has('KeyD') ? 1 : 0) - (keys.has('KeyA') ? 1 : 0);
    direction.y = (keys.has('KeyE') ? 1 : 0) - (keys.has('KeyQ') ? 1 : 0);
    direction.normalize();
    if (direction.z) velocity.z -= direction.z * accel * dt;
    if (direction.x) velocity.x -= direction.x * accel * dt;
    if (direction.y) velocity.y += direction.y * accel * dt;
    fpsControls.moveRight(-velocity.x * dt);
    fpsControls.moveForward(-velocity.z * dt);
    fpsControls.getObject().position.y += velocity.y * dt;
  }

  renderer.render(scene, camera);
}
tick();
init();
</script>
</body>
</html>
